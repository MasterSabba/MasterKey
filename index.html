<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free The Key: Wood Edition</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    
    <button id="back-to-selection" class="back-link">&#x2715;</button>

    <div id="level-selection-interface" class="interface selection-active">
        <h1>Seleziona Livello</h1>
        
        <div id="level-grid" class="level-grid">
            </div>

        <div class="selection-controls">
            <button id="prev-page" class="nav-btn">&lt;</button>
            <span id="page-indicator">1 / 5</span>
            <button id="next-page" class="nav-btn">&gt;</button>
        </div>
    </div>

    <div id="game-interface" class="interface" style="display: none;">
        <div class="game-container">
            <h1>Livello <span id="current-level-display">1</span></h1>
            
            <div class="board-frame">
                <div id="grid" class="grid">
                    </div>
            </div>

            <div class="controls">
                <button class="btn-wood" onclick="resetLevel()">Reset</button> 
                <button id="complete-level-btn" class="btn-wood btn-complete">Completa (Test)</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script> 
</body>
</html>
